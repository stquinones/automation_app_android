name: Procesar log y enviar a Slack

on:
  push:
    paths:
      - 'scripts/log/**'

jobs:
  procesar-y-notificar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependencias
        run: npm install

      - name: Generar reporte
        id: reporte
        run: node scripts/generate-report.js

      - name: Subir reporte como artifact
        uses: actions/upload-artifact@v4
        with:
          name: reporte-html
          path: scripts/report/reporte.html  

      - name: Enviar a Slack
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data "{\"text\":\"${{ steps.reporte.outputs.SLACK_TEXT }}\n📄 Ver reporte: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          ${{ secrets.SLACK_WEBHOOK_URL }}
      
      